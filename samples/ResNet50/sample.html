<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>ResNet50 WebGPU WASM Demo</title>
  <style>
    body { font-family: sans-serif; background: #1c2a2d; color: #eee; padding: 2em;}
    #output { margin-top: 2em; }
    .controls { display: flex; gap: 1em; align-items: center; flex-wrap: wrap; }
    input[type="number"] { width: 6em; }
    select { min-width: 12em; }
  </style>
</head>
<body>
  <h1>ResNet50 WebGPU WASM Demo</h1>
  <div class="controls">
    <input type="file" id="select_file" accept="image/*" />
    <label>
      Runs
      <input type="number" id="benchmark_runs" min="1" max="20" value="1" />
    </label>
    <label>
      CPU
      <select id="cpu_benchmark_mode">
        <option value="fast" selected>SIMD threads only</option>
        <option value="full">Full scalar/SIMD/threads</option>
        <option value="none">GPU only</option>
      </select>
    </label>
    <label>
      CPU kernel
      <select id="cpu_kernel_mode">
        <option value="4" selected>OC4 x 4</option>
        <option value="8">OC4 x 8</option>
        <option value="compare">Compare OC4 x 4/8</option>
      </select>
    </label>
    <label>
      <input type="checkbox" id="cpu_profile_logging" />
      CPU layer logs
    </label>
    <button id="button_start">Process</button>
  </div>
  <div id="output"></div>
  <script src="app.js"></script>
</body>
</html>
